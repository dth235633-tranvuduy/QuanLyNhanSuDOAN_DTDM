<svg width="540" height="172" viewBox="0 0 540 172" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="logoTitle logoDesc">
  <title id="logoTitle">SevenTime HRMS</title>
  <desc id="logoDesc">Professional logo for SevenTime human resource management system.</desc>

  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="540" y2="172" gradientUnits="userSpaceOnUse">
      <stop stop-color="#0B2B43"/>
      <stop offset="1" stop-color="#0E4A6B"/>
    </linearGradient>
    <linearGradient id="ringA" x1="38" y1="30" x2="118" y2="118" gradientUnits="userSpaceOnUse">
      <stop stop-color="#36D1DC"/>
      <stop offset="1" stop-color="#58E7C3"/>
    </linearGradient>
    <linearGradient id="ringB" x1="22" y1="46" x2="86" y2="106" gradientUnits="userSpaceOnUse">
      <stop stop-color="#FFB04A"/>
      <stop offset="1" stop-color="#FF8C3A"/>
    </linearGradient>
    <linearGradient id="spark" x1="73" y1="76" x2="106" y2="114" gradientUnits="userSpaceOnUse">
      <stop stop-color="#6EF2D1"/>
      <stop offset="1" stop-color="#3BD8E3"/>
    </linearGradient>
    <filter id="softShadow" x="0" y="0" width="540" height="172" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="8" stdDeviation="9" flood-color="#062335" flood-opacity="0.28"/>
    </filter>
  </defs>

  <g filter="url(#softShadow)">
    <rect x="4" y="4" width="532" height="164" rx="30" fill="url(#bg)"/>
    <rect x="4.75" y="4.75" width="530.5" height="162.5" rx="29.25" stroke="#90EDE5" stroke-opacity="0.32" stroke-width="1.5"/>
  </g>

  <g transform="translate(26 22)">
    <circle cx="64" cy="64" r="47" fill="#0A2539"/>
    <path d="M64 18C89.4 18 110 38.6 110 64" stroke="url(#ringA)" stroke-width="11" stroke-linecap="round"/>
    <path d="M18 64C18 38.6 38.6 18 64 18" stroke="url(#ringB)" stroke-width="11" stroke-linecap="round"/>
    <path d="M64 110C38.6 110 18 89.4 18 64" stroke="#176A8E" stroke-width="11" stroke-linecap="round"/>
    <path d="M86 88L108 110" stroke="url(#spark)" stroke-width="7" stroke-linecap="round"/>
    <circle cx="109" cy="111" r="6" fill="#FFB04A"/>
    <path d="M49 63.5L61 75.5L81 54" stroke="#8DF5D8" stroke-width="7" stroke-linecap="round" stroke-linejoin="round"/>
