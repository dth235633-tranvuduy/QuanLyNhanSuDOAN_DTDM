  <text x="164" y="82" fill="#F4FBFF" font-family="Segoe UI, Arial, sans-serif" font-size="56" font-weight="800" letter-spacing="1.4" textLength="336" lengthAdjust="spacingAndGlyphs">SEVENTIME</text>
  <text x="166" y="116" fill="#84EEDF" font-family="Segoe UI, Arial, sans-serif" font-size="20" font-weight="700" letter-spacing="5" textLength="230" lengthAdjust="spacingAndGlyphs">HRMS SYSTEM</text>
